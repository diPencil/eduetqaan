
    <div class="flex h-screen bg-slate-50 font-sans overflow-hidden" dir="rtl">
      
      <!-- Backdrop Overlay (Mobile Only) -->
      <div 
        *ngIf="isSidebarOpen()" 
        (click)="closeSidebar()"
        class="fixed inset-0 z-40 bg-slate-900/40 backdrop-blur-sm lg:hidden animate-in fade-in duration-300"
      ></div>

      <!-- Sidebar Container -->
      <aside 
        class="fixed lg:static inset-y-0 right-0 z-50 w-72 bg-white transform transition-transform duration-500 ease-in-out lg:translate-x-0 border-l border-slate-200 shadow-2xl lg:shadow-none"
        [class.translate-x-0]="isSidebarOpen()"
        [class.translate-x-full]="!isSidebarOpen()"
      >
        <app-sidebar></app-sidebar>
      </aside>

      <!-- Main Content -->
      <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <!-- Header -->
        <app-header></app-header>

        <!-- Tab Bar -->
        <app-tab-bar></app-tab-bar>

        <!-- Main Routing Container -->
        <main #scrollContainer class="flex-1 overflow-x-hidden overflow-y-auto bg-slate-50 p-4 md:p-8">
          <div class="max-w-7xl mx-auto">
            <router-outlet (activate)="scrollContainer.scrollTop = 0"></router-outlet>
          </div>
        </main>
      </div>

      <!-- Global Shared Components -->
      <app-toast-container></app-toast-container>
      <app-confirm-modal></app-confirm-modal>
      <app-alert-modal></app-alert-modal>
    </div>
