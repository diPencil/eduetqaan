
    <div class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[9999] flex flex-col gap-3 pointer-events-none items-center w-full max-w-md px-4">
      <div *ngFor="let toast of toastService.toasts()" 
           class="pointer-events-auto flex items-center gap-4 px-6 py-4 rounded-[24px] shadow-2xl backdrop-blur-xl border border-white/20 animate-in slide-in-from-bottom-5 fade-in duration-300 w-full"
           [ngClass]="{
             'bg-emerald-500/95 text-white': toast.type === 'success',
             'bg-rose-500/95 text-white': toast.type === 'error',
             'bg-amber-500/95 text-white': toast.type === 'warning',
             'bg-blue-600/95 text-white': toast.type === 'info'
           }">
        <div class="shrink-0 bg-white/20 rounded-full p-2">
           <app-icon [name]="getIcon(toast.type)" [size]="20"></app-icon>
        </div>
        <div class="flex-1 text-right">
          <p *ngIf="toast.title" class="text-[10px] font-black uppercase tracking-widest opacity-80 mb-0.5">{{ toast.title }}</p>
          <p class="font-bold text-sm tracking-tight leading-snug">{{ toast.message }}</p>
        </div>
        <button (click)="toastService.remove(toast.id)" class="shrink-0 w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/20 transition-colors">
          <app-icon name="x" [size]="16"></app-icon>
        </button>
      </div>
    </div>
