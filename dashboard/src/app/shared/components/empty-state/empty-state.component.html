
    <div class="flex flex-col items-center justify-center text-center p-12 w-full animate-in fade-in duration-500">
      <div class="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center mb-6 opacity-80"
           [ngClass]="colorClass">
        <app-icon [name]="icon" [size]="48"></app-icon>
      </div>
      <h3 class="text-2xl font-black text-slate-800 mb-2">{{ title }}</h3>
      <p class="text-slate-500 font-bold mb-8 max-w-md">{{ message }}</p>
      
      <button *ngIf="actionLabel" 
              (click)="action.emit()" 
              class="px-8 py-3 rounded-xl font-black text-white shadow-lg transition-all"
              [ngClass]="buttonClass">
        {{ actionLabel }}
      </button>
    </div>
