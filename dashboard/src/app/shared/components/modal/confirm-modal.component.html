
    <div *ngIf="modalService.confirmOptions() as options" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md animate-in fade-in duration-300" dir="rtl">
      <div class="bg-white rounded-[32px] shadow-2xl w-full max-w-md overflow-hidden animate-in zoom-in duration-300 border border-slate-100 px-2 py-4">
        <div class="p-8 text-center">
          <div class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl shadow-inner"
               [ngClass]="{
                 'bg-rose-50 text-rose-500': options.confirmType === 'danger' || !options.confirmType,
                 'bg-amber-50 text-amber-500': options.confirmType === 'warning',
                 'bg-blue-50 text-blue-500': options.confirmType === 'primary'
               }">
             <app-icon [name]="getIcon(options.confirmType)" [size]="40"></app-icon>
          </div>
          <h3 class="text-2xl font-black text-slate-800 mb-2">{{ options.title }}</h3>
          <p class="text-slate-500 font-medium font-bold whitespace-pre-line">{{ options.message }}</p>
        </div>
        
        <div class="p-6 bg-slate-50/50 flex gap-4 rounded-b-[32px]">
          <button (click)="onCancel(options)" class="flex-1 py-4 rounded-2xl font-black text-slate-500 hover:bg-white hover:shadow-sm transition-all border border-transparent hover:border-slate-200">
            {{ options.cancelText || 'إلغاء' }}
          </button>
          <button (click)="onConfirm(options)" 
                  class="flex-1 py-4 text-white rounded-2xl font-black transition-all shadow-lg"
                  [ngClass]="{
                    'bg-rose-600 hover:bg-rose-700 shadow-rose-500/30': options.confirmType === 'danger' || !options.confirmType,
                    'bg-amber-600 hover:bg-amber-700 shadow-amber-500/30': options.confirmType === 'warning',
                    'bg-blue-600 hover:bg-blue-700 shadow-blue-500/30': options.confirmType === 'primary'
                  }">
            {{ options.confirmText || 'تأكيد' }}
          </button>
        </div>
      </div>
    </div>
