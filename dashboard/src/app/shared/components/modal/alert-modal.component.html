
    <div *ngIf="modalService.alertOptions() as options" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md animate-in fade-in duration-300" dir="rtl">
      <div class="bg-white rounded-[32px] shadow-2xl w-full max-w-md overflow-hidden animate-in zoom-in duration-300 border border-slate-100 px-2 py-4">
        <div class="p-8 text-center">
          <div class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl shadow-inner"
               [ngClass]="{
                 'bg-emerald-50 text-emerald-500': options.type === 'success' || !options.type,
                 'bg-rose-50 text-rose-500': options.type === 'error',
                 'bg-amber-50 text-amber-500': options.type === 'warning',
                 'bg-blue-50 text-blue-500': options.type === 'info'
               }">
             <app-icon [name]="getIcon(options.type)" [size]="40"></app-icon>
          </div>
          <h3 class="text-2xl font-black text-slate-800 mb-2">{{ options.title }}</h3>
          <p class="text-slate-500 font-medium font-bold whitespace-pre-line">{{ options.message }}</p>
        </div>
        
        <div class="p-6 bg-slate-50/50 rounded-b-[32px]">
          <button (click)="onClose(options)" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black shadow-lg shadow-slate-900/20 hover:bg-slate-800 transition-all">
            {{ options.buttonText || 'حسناً' }}
          </button>
        </div>
      </div>
    </div>
