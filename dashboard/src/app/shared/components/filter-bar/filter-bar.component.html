
    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex flex-col md:flex-row md:items-center gap-4 flex-wrap">
      
      <!-- Search -->
      <div *ngIf="showSearch" class="flex-1 min-w-[250px]">
        <app-search-input 
          [placeholder]="searchPlaceholder" 
          (search)="onSearch($event)">
        </app-search-input>
      </div>

      <!-- Filters -->
      <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
        <div *ngFor="let filter of filters" class="relative min-w-[150px] flex-1 md:flex-none">
          <select 
            *ngIf="!filter.type || filter.type === 'select'"
            [(ngModel)]="filter.value" 
            (change)="onFilterChange()"
            class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl py-3.5 px-4 text-sm font-bold text-slate-700 outline-none focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all appearance-none cursor-pointer">
            <option [ngValue]="null" class="text-slate-400">{{ filter.label }} (الكل)</option>
            <option *ngFor="let opt of filter.options" [ngValue]="opt.value">{{ opt.label }}</option>
          </select>
          <div *ngIf="!filter.type || filter.type === 'select'" class="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400 text-xs">▼</div>
          
          <input 
            *ngIf="filter.type === 'date'"
            type="date"
            [(ngModel)]="filter.value"
            (change)="onFilterChange()"
            class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl py-3.5 px-4 text-sm font-bold text-slate-700 outline-none focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all cursor-pointer"
          >
        </div>
      </div>

      <!-- Actions Area -->
      <div class="flex items-center gap-3 w-full md:w-auto mt-4 md:mt-0">
        <ng-content select="[actions]"></ng-content>
      </div>
    </div>
