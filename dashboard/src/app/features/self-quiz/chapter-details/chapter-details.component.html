
    <div class="space-y-6 font-sans pb-20" dir="rtl">
      <!-- Header -->
      <div class="flex items-center justify-between bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 animate-in fade-in slide-in-from-top-4 duration-500">
        <div class="flex items-center gap-6">
          <button routerLink="/self-quiz" class="w-12 h-12 bg-slate-50 hover:bg-slate-100 rounded-2xl flex items-center justify-center text-slate-400 transition-all shadow-sm">🔙</button>
          <div>
            <nav class="flex text-[10px] text-slate-400 mb-1 gap-2 font-black uppercase tracking-widest">
              <a routerLink="/self-quiz" class="hover:text-indigo-600 transition-colors">بنك الأسئلة</a>
              <span>/</span>
              <span class="text-slate-600">إدارة الأسئلة</span>
            </nav>
            <h1 class="text-2xl font-black text-slate-800 tracking-tight italic">{{ chapter()?.title || 'تحميل...' }}</h1>
          </div>
        </div>
        <button (click)="openAddModal()" class="bg-indigo-600 text-white px-8 py-4 rounded-[2rem] font-black shadow-xl shadow-indigo-500/20 hover:bg-indigo-700 transition-all flex items-center gap-2">
          <span>➕</span> إضافة سؤال بنك
        </button>
      </div>

      <!-- Questions List -->
      <div class="space-y-6">
        <div *ngFor="let q of questions(); let i = index" class="bg-white border border-slate-100 rounded-[2.5rem] p-8 hover:shadow-xl hover:shadow-indigo-500/5 transition-all group relative animate-in fade-in slide-in-from-bottom-4 duration-500" [style.animationDelay.ms]="i * 100">
          <div class="flex justify-between items-start mb-6">
            <div class="flex items-center gap-4">
              <span class="w-10 h-10 rounded-2xl bg-slate-50 border border-slate-100 flex items-center justify-center font-black text-slate-400 text-sm shadow-sm">{{ i+1 }}</span>
              <div class="flex flex-col">
                <span class="text-[10px] text-slate-400 font-black uppercase tracking-widest">سؤال MCQ</span>
                <span class="text-[10px] text-indigo-600 font-black">ترتيب: {{ q.orderIndex }}</span>
              </div>
            </div>
            <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-all transform group-hover:translate-x-2">
              <button (click)="onDeleteQuestion(q.id!)" class="w-10 h-10 flex items-center justify-center bg-red-50 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition-all shadow-sm">🗑️</button>
            </div>
          </div>
          
          <div class="space-y-4 mb-8">
            <p class="text-xl font-black text-slate-800 leading-relaxed">{{ q.body }}</p>
            <img *ngIf="q.imageUrl" [src]="q.imageUrl" class="max-w-md rounded-2xl border-4 border-slate-50 shadow-inner">
            <div *ngIf="q.explanation" class="p-4 bg-amber-50 rounded-2xl border border-amber-100 border-dashed">
               <p class="text-[10px] font-black text-amber-600 uppercase mb-1">💡 شرح الحل / ملاحظة:</p>
               <p class="text-sm font-bold text-amber-800 italic">{{ q.explanation }}</p>
            </div>
          </div>
          
          <!-- MCQ Choices Grid -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div *ngFor="let choice of q.choices" 
                 class="p-5 rounded-3xl border-2 flex items-center gap-4 transition-all"
                 [ngClass]="choice.isCorrect ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-slate-50 border-slate-100 text-slate-400'">
              <div class="w-8 h-8 rounded-xl flex items-center justify-center text-xs font-black shadow-sm"
                    [ngClass]="choice.isCorrect ? 'bg-emerald-200 text-emerald-700' : 'bg-white text-slate-300'">
                {{ choice.orderIndex }}
              </div>
              <div class="flex-1">
                <p class="font-black text-sm">{{ choice.label }}</p>
                <img *ngIf="choice.imageUrl" [src]="choice.imageUrl" class="mt-2 h-20 rounded-lg border border-white/50">
              </div>
              <span *ngIf="choice.isCorrect" class="text-xl">✅</span>
            </div>
          </div>
        </div>

        <div *ngIf="!questions().length && !isLoading()" class="py-32 text-center bg-white rounded-[3rem] border-2 border-dashed border-slate-100 italic">
           <span class="text-6xl block mb-4 opacity-20">❓</span>
           <p class="text-slate-400 font-black uppercase tracking-widest">لا توجد أسئلة في هذا الفصل حتى الآن</p>
           <button (click)="openAddModal()" class="mt-6 text-indigo-600 font-black hover:underline cursor-pointer">أضف أول سؤال الآن</button>
        </div>
      </div>

      <!-- Add Question Modal -->
      <div *ngIf="showModal()" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md animate-in fade-in duration-200">
        <div class="bg-white rounded-[3rem] shadow-2xl w-full max-w-3xl overflow-hidden animate-in zoom-in duration-200 border border-white/20">
           <div class="px-10 py-8 flex items-center justify-between border-b border-slate-50 bg-slate-50/50">
             <div class="flex items-center gap-3">
               <span class="text-2xl">✍️</span>
               <h3 class="text-xl font-black text-slate-800 italic">إضافة سؤال MCQ لـ بنك الأسئلة</h3>
             </div>
             <button (click)="showModal.set(false)" class="w-12 h-12 bg-white text-slate-400 rounded-full flex items-center justify-center hover:bg-red-50 hover:text-red-500 transition-all font-black shadow-md">✕</button>
           </div>
           
           <div class="p-10 space-y-8 max-h-[75vh] overflow-y-auto custom-scrollbar">
             <!-- Question Body -->
             <div class="space-y-3">
               <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mr-2">نص السؤال *</label>
               <textarea [(ngModel)]="form.body" rows="4" placeholder="اكتب نص السؤال هنا بوضوح..." 
                         class="w-full px-8 py-6 bg-slate-50 border border-slate-100 rounded-[2rem] focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all font-bold text-lg placeholder:text-slate-300 resize-none"></textarea>
             </div>

             <!-- Optional Info -->
             <div class="grid grid-cols-2 gap-6">
                <div class="space-y-3">
                  <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mr-2">رابط صورة السؤال (اختياري)</label>
                  <input [(ngModel)]="form.imageUrl" type="text" placeholder="https://..." 
                         class="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all font-bold text-sm">
                </div>
                <div class="space-y-3">
                  <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mr-2">رقم الترتيب</label>
                  <input [(ngModel)]="form.orderIndex" type="number" 
                         class="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all font-black">
                </div>
             </div>

             <div class="space-y-3">
               <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mr-2">شرح الإجابة (يظهر للطالب بعد الحل)</label>
               <textarea [(ngModel)]="form.explanation" rows="2" placeholder="لماذا هذه هي الإجابة الصحيحة؟" 
                         class="w-full px-6 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all font-bold text-sm placeholder:text-slate-300 italic"></textarea>
             </div>

             <!-- Choices Management -->
             <div class="space-y-6 pt-6 border-t border-slate-50">
                <div class="flex items-center justify-between">
                  <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mr-2">الخيارات (حدد الجواب الصحيح) *</label>
                  <button (click)="addChoice()" class="text-indigo-600 text-[10px] font-black uppercase hover:underline">➕ إضافة اختيار آخر</button>
                </div>

                <div class="space-y-4">
                  <div *ngFor="let choice of form.choices; let i = index" class="flex items-start gap-4 animate-in slide-in-from-right-4 duration-300">
                     <button (click)="setCorrectChoice(i)" 
                             [ngClass]="choice.isCorrect ? 'bg-emerald-500 text-white shadow-emerald-500/20' : 'bg-slate-100 text-slate-300'"
                             class="w-12 h-12 rounded-2xl flex items-center justify-center font-black text-lg shadow-lg transition-all shrink-0">
                       {{ choice.isCorrect ? '✅' : i + 1 }}
                     </button>
                     <div class="flex-1 space-y-2">
                        <input [(ngModel)]="choice.label" type="text" [placeholder]="'عنوان الاختيار ' + (i+1)" 
                               class="w-full px-6 py-3 bg-slate-50 border border-slate-100 rounded-xl focus:ring-4 focus:ring-indigo-500/10 outline-none transition-all font-bold text-sm">
                        <input [(ngModel)]="choice.imageUrl" type="text" placeholder="رابط صورة الاختيار (اختياري)" 
                               class="w-full px-6 py-2 bg-slate-50/50 border border-slate-100 rounded-lg focus:ring-2 focus:ring-indigo-500/10 outline-none transition-all font-medium text-[10px]">
                     </div>
                     <button (click)="removeChoice(i)" class="p-2 text-slate-200 hover:text-red-500 transition-colors pt-4">✕</button>
                  </div>
                </div>
             </div>

             <button (click)="onSaveQuestion()" [disabled]="isSaving() || !form.body || !hasCorrectChoice()"
                     class="w-full py-6 bg-indigo-600 text-white rounded-[2.5rem] font-black shadow-2xl shadow-indigo-100 hover:bg-indigo-700 disabled:opacity-30 transition-all transform active:scale-95 text-lg">
               {{ isSaving() ? 'جاري الحفظ...' : 'تأكيد وحفظ السؤال في البنك 🚀' }}
             </button>
           </div>
        </div>
      </div>
    </div>
